name: Codex Auto-Fix on Failure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out failing branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Codex to fix CI
        id: codex_fix
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            The CI workflow failed on this branch.

            Your task:
            - inspect the repository
            - identify the likely cause of the failure
            - make the smallest safe change to fix it
            - run the relevant tests or checks if available
            - summarize exactly what changed

            Constraints:
            - do not make broad refactors
            - do not change unrelated files
            - prefer minimal, reviewable patches
          output-file: codex-fix-summary.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create fix branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git checkout -b codex/auto-fix-${{ github.run_id }}
          git add .
          git commit -m "Codex: attempt CI autofix"

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin HEAD

      - name: Open pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const summary = fs.existsSync('codex-fix-summary.md')
              ? fs.readFileSync('codex-fix-summary.md', 'utf8')
              : 'Codex generated a candidate CI fix.'

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Codex: CI autofix proposal',
              head: `codex/auto-fix-${context.runId}`,
              base: '${{ github.event.workflow_run.head_branch }}',
              body:
                `Automated fix proposal after CI failure.\n\n` +
                `Failed workflow: ${context.payload.workflow_run.name}\n` +
                `Branch: ${context.payload.workflow_run.head_branch}\n\n` +
                `### Codex summary\n\n${summary}`
            })
          
